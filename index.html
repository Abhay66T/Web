<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* NAVBAR */

nav{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav h1{
margin:0;
}

/* HERO */

.hero{
height:80vh;
background:url("https://i.ibb.co/bR8R0BvV/IMG-0895.jpg") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero button{
padding:12px 25px;
background:#00eaff;
border:none;
cursor:pointer;
font-size:16px;
}

/* PRODUCTS */

.products{
padding:40px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
border-radius:8px;
}

.product button{
margin-top:10px;
background:#111;
color:white;
border:none;
padding:10px;
cursor:pointer;
}

/* CART */

.cart{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

.order{
margin-top:10px;
padding:12px;
background:#00eaff;
border:none;
width:100%;
cursor:pointer;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
text-decoration:none;
}

</style>
</head>

<body>

<nav>
<h1>Tech Store</h1>
<span>Fresh Finds, Best Prices</span>
</nav>

<section class="hero">
<h2>Latest Tech Products</h2>
<p>Buds • Headphones • Phones</p>
<button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">
Shop Now
</button>
</section>


<section class="products" id="products">

<h2>Products</h2>

<div class="grid">

<div class="product">
<img src="https://i.ibb.co/8nJF6pHw/0-e1e4339f-0237-4909-8202-0176f1dbfffa.jpg">
<h3>Wireless Earbuds</h3>
<p>₹999</p>
<button onclick="addCart('Wireless Earbuds',999)">Add</button>
</div>

<div class="product">
<img src="https://i.ibb.co/8nJF6pHw/0-e1e4339f-0237-4909-8202-0176f1dbfffa.jpg">
<h3>Bluetooth Headphones</h3>
<p>₹1499</p>
<button onclick="addCart('Bluetooth Headphones',1499)">Add</button>
</div>

<div class="product">
<img src="https://i.ibb.co/8nJF6pHw/0-e1e4339f-0237-4909-8202-0176f1dbfffa.jpg">
<h3>Smart Phone</h3>
<p>₹12999</p>
<button onclick="addCart('Smart Phone',12999)">Add</button>
</div>

</div>

</section>


<section class="cart">

<h2>Your Cart</h2>

<ul id="cartItems"></ul>

<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">

<button class="order" onclick="order()">Place Order</button>

</section>


<a class="whatsapp" href="https://wa.me/" target="_blank">💬</a>


<script>

let cart=[]

function addCart(name,price){

cart.push({name,price})

let list=document.getElementById("cartItems")

let li=document.createElement("li")

li.innerText=name+" - ₹"+price

list.appendChild(li)

}

function order(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

let items=cart.map(i=>i.name+" ₹"+i.price).join("%0D%0A")

let mail=`mailto:abhaypandit673@gmail.com?subject=Order&body=Name:${name}%0D%0APhone:${phone}%0D%0AItems:%0D%0A${items}`

window.location.href=mail

}

</script>

</body>
</html>
